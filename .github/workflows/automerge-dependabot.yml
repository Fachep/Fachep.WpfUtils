on:
  pull_request:
    branches: [ main ]

jobs:
  call_build:
    if: ${{ github.triggering_actor == 'dependabot[bot]' }}
    uses: ./.github/workflows/build-and-deploy.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: write
    with:
      project: Fachep.WpfUtils
      project_prefix: ''
      test: true
      test_suffix: ''
      publish: false
      pull_request: ${{ github.event.number }}

  automerge:
    runs-on: ubuntu-latest
    needs: call_build
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@v3.12.0
