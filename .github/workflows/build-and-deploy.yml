name: Build and deploy

on:
  push:
    branches: [ main ]
    tags:
      - '*-v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Parse Metadata
        id: parse_meta
        run: |
          "${{ github.repository }}" -match '^[^/]+/([^/]+)$'
          $repo = $matches[1]
          if ("${{ github.ref_name }}" -match '^(.*)-v(\d+\.\d+\.\d+)$') {
              $project = $matches[1]
              $version = $matches[2]
              Add-Content -Path $env:GITHUB_OUTPUT -Value "project=$repo.$project`nversion=$version"
          } else {
              Add-Content -Path $env:GITHUB_OUTPUT -Value "project=.`nversion=0.0.1"
          }

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: dotnet restore
        run: dotnet restore --configuration Release

      - name: dotnet build
        run: dotnet build "${{ steps.parse_meta.outputs.project }}" --configuration Release --no-restore -p:Version="${{ steps.parse_meta.outputs.version }}"
        
      - name: check test
        id: check_test
        run: |
          if (Test-Path -Path "${{ steps.parse_meta.outputs.project }}.Tests") {
              Add-Content -Path $env:GITHUB_OUTPUT -Value "test_project=${{ steps.parse_meta.outputs.project }}.Tests"
          }

      - name: dotnet test
        if: ${{ steps.check_test.outputs.test_project }}
        run: dotnet test "${{ steps.check_test.outputs.test_project }}" --configuration Release --no-build --collect:"XPlat Code Coverage" -p:Version="${{ steps.parse_meta.outputs.version }}"

      - name: ReportGenerator
        if: ${{ steps.check_test.outputs.test_project }}
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: '**/TestResults/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: Html;MarkdownSummaryGithub
          title: 'Code Coverage'

      - name: Write PR Number
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo ${{ github.event.number }} > ./coveragereport/PullRequestNumber

      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: CodeCoverage
          path: coveragereport/
          if-no-files-found: error

      - name: dotnet pack
        run: dotnet pack "${{ steps.parse_meta.outputs.project }}" --configuration Release --no-build -o "${{ github.workspace }}/NuGet" -p:Version="${{ steps.parse_meta.outputs.version }}"

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v7
        with:
          name: NuGet
          path: ${{ github.workspace }}/NuGet

  automerge:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: fastify/github-action-merge-dependabot@v3.12.0

  deploy-nuget:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      id-token: write
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push NuGet
        run: dotnet nuget push ${{ github.workspace }}/*nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
